name: Docker Publish
on:
  push:
    branches:
      - main
permissions: 
  contents: read
  packages: write
jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Login en el registro de contenedor
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Publica y sube la imagen docker
        run: |
          docker build . --tag ghcr.io/dll2q/skills-publish-docker-images/stackoverflown:main
          docker push ghcr.io/dll2q/skills-publish-docker-images/stackoverflown:main
